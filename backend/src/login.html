<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{SITE_TITLE}</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --container: rgba(17, 24, 39, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --primary: #4f46e5;
            --text: #f3f4f6;
            --text-muted: #9ca3af;
            --danger: #ef4444;
            --transition: 0.2s ease-in-out;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .login-container {
            position: relative;
            width: 90%;
            max-width: 400px;
            margin: 40px auto;
            z-index: 10;
        }
        .login-box {
            background: var(--container);
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            width: 100%;
            text-align: center;
        }
        .login-box h2 {
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--text);
            opacity: 0.8;
            margin-bottom: 2rem;
            line-height: 1.2;
        }
        .pin-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
        }
        .pin-input-field {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.5em;
            padding: 0.75rem 1rem;
            width: 100%;
            max-width: 280px;
            background: rgba(0, 0, 0, 0.2);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 16px;
            outline: none;
            transition: all var(--transition);
        }
        .pin-input-field:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.25);
        }
        .pin-input-field:disabled { opacity: 0.5; cursor: not-allowed; }
        .pin-status { margin-top: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
        .attempts-remaining {
            color: var(--danger);
            font-size: 0.9rem;
            font-weight: 600;
            background: rgba(239, 68, 68, 0.08);
            padding: 0.5rem 1rem;
            border-radius: 10px;
            display: inline-block;
        }
        .lockout-notice {
            color: var(--danger);
            font-size: 0.95rem;
            font-weight: 600;
            background: rgba(239, 68, 68, 0.08);
            padding: 0.85rem 1.25rem;
            border-radius: 12px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .pin-error { color: var(--danger); font-size: 0.9rem; font-weight: 500; display: none; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
        .shake { animation: shake 0.2s ease-in-out 2; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box" id="loginCard">
            <div class="pin-header">
                <h2 id="pin-description">Enter PIN</h2>
            </div>
            <form id="pin-form" onsubmit="handleLogin(event)">
                <div class="pin-wrapper">
                    <input
                        type="password"
                        id="pinInput"
                        class="pin-input-field"
                        placeholder="••••"
                        required
                        autofocus
                        autocomplete="current-password"
                    >
                </div>
            </form>
            <div class="pin-status">
                <p id="pin-error" class="pin-error"></p>
                <div id="attempts-box"></div>
            </div>
        </div>
    </div>
    <script>
        let pinLength = 4;
        async function init() {
            try {
                const response = await fetch('/api/pin-required');
                if (response.ok) {
                    const data = await response.json();
                    pinLength = data.length || 4;
                    const pinInput = document.getElementById('pinInput');
                    pinInput.maxLength = pinLength;
                    pinInput.placeholder = "• ".repeat(pinLength).trim();
                    if (data.locked) {
                        setLockoutState(data.lockout_minutes || 15);
                    } else {
                        updateAttemptsRemaining(data.attempts_left);
                    }
                }
            } catch (err) {
                console.error("Failed to query PIN requirements:", err);
            }
        }
        function setLockoutState(minutes) {
            const pinInput = document.getElementById('pinInput');
            const pinDescription = document.getElementById('pin-description');
            const attemptsBox = document.getElementById('attempts-box');
            const pinError = document.getElementById('pin-error');
            pinInput.disabled = true;
            pinDescription.textContent = "Locked Out";
            pinError.style.display = "none";
            attemptsBox.innerHTML = `<span class="lockout-notice">Too many attempts. Please try again in ${minutes} minutes.</span>`;
        }
        function updateAttemptsRemaining(attemptsLeft) {
            const attemptsBox = document.getElementById('attempts-box');
            if (attemptsLeft !== undefined && attemptsLeft < 5) {
                attemptsBox.innerHTML = `<span class="attempts-remaining">${attemptsLeft} attempts remaining</span>`;
            } else {
                attemptsBox.innerHTML = "";
            }
        }
        async function handleLogin(e) {
            e.preventDefault();
            const pinInput = document.getElementById('pinInput');
            const pinError = document.getElementById('pin-error');
            const pin = pinInput.value.trim();
            if (!pin) return;
            try {
                const response = await fetch('/api/verify-pin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin })
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    window.location.reload();
                } else {
                    if (data.locked) {
                        setLockoutState(data.lockout_minutes || 15);
                    } else {
                        showError(data.error || "Invalid PIN.");
                        updateAttemptsRemaining(data.attempts_left);
                    }
                }
            } catch (err) {
                showError("Connection error. Please try again.");
            }
        }
        function showError(msg) {
            const pinInput = document.getElementById('pinInput');
            const pinError = document.getElementById('pin-error');
            const card = document.getElementById('loginCard');
            pinError.textContent = msg;
            pinError.style.display = "block";
            card.classList.add('shake');
            pinInput.value = '';
            pinInput.focus();
            setTimeout(() => card.classList.remove('shake'), 400);
        }
        document.getElementById('pinInput').addEventListener('input', (e) => {
            if (e.target.value.length === pinLength) {
                handleLogin(new Event('submit'));
            }
        });
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
