name: "Build & Publish Docker Image (CD)"

on:
  push:
    branches:
      - master
      - dev
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PLATFORMS: linux/amd64

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      # Log in to GitHub Container Registry (GHCR)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Optionally log in to Docker Hub if credentials are provided
      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version from Cargo.toml
        id: package_version
        run: |
          VERSION=$(grep -m 1 '^version = ' Cargo.toml | cut -d '"' -f 2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Generate Docker Metadata
        id: meta
        run: |
          LOWER_IMAGE_NAME_GHCR=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          LOWER_IMAGE_NAME_DOCKER=$(echo "ubermetroid/rustle" | tr '[:upper:]' '[:lower:]')
          VERSION=${{ steps.package_version.outputs.VERSION }}
          
          # GHCR tags
          GHCR_TAGS="${LOWER_IMAGE_NAME_GHCR}:${VERSION}"
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            GHCR_TAGS="${GHCR_TAGS},${LOWER_IMAGE_NAME_GHCR}:latest"
          elif [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            GHCR_TAGS="${GHCR_TAGS},${LOWER_IMAGE_NAME_GHCR}:dev"
          fi
          
          # Docker Hub tags
          DOCKER_TAGS="${LOWER_IMAGE_NAME_DOCKER}:${VERSION}"
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            DOCKER_TAGS="${DOCKER_TAGS},${LOWER_IMAGE_NAME_DOCKER}:latest"
          elif [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            DOCKER_TAGS="${DOCKER_TAGS},${LOWER_IMAGE_NAME_DOCKER}:dev"
          fi
          
          echo "GHCR_TAGS=${GHCR_TAGS}" >> $GITHUB_OUTPUT
          echo "DOCKER_TAGS=${DOCKER_TAGS}" >> $GITHUB_OUTPUT
          echo "Generated GHCR tags: ${GHCR_TAGS}"
          echo "Generated Docker Hub tags: ${DOCKER_TAGS}"

      - name: Build and Push to Docker Hub
        if: ${{ secrets.DOCKER_USERNAME != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.DOCKER_TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Build and Push to GHCR
        uses: docker/build-push-action@v6
        continue-on-error: true
        with:
          context: .
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.GHCR_TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          build-args: |
            BUILDKIT_INLINE_CACHE=1
