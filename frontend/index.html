<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Rustle - Wordle clone in pure Rust" />
    <title>Rustle</title>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Rustle" />
    <meta property="og:description" content="Self-hosted Wordle clone, dockerized." />
    <meta property="og:image" content="/assets/favicon.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary" />
    <meta property="twitter:title" content="Rustle" />
    <meta property="twitter:description" content="Self-hosted Wordle clone, dockerized." />
    <meta property="twitter:image" content="/assets/favicon.png" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        // Prevent theme flicker by setting theme immediately
        (function() {
            let theme = null;
            if (typeof document !== 'undefined' && document.cookie) {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const c = cookies[i].trim();
                    if (c.startsWith('super_metroid_theme=')) {
                        theme = c.substring('super_metroid_theme='.length);
                        break;
                    }
                }
            }
            if (theme && theme.startsWith('"') && theme.endsWith('"') && theme.length >= 2) {
                theme = theme.slice(1, -1);
            }
            if (!theme) {
                theme = localStorage.getItem('theme') || 'crateria';
                if (theme.startsWith('"') && theme.endsWith('"')) {
                    theme = theme.slice(1, -1);
                }
            }
            document.documentElement.className = theme;
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <link data-trunk rel="css" href="https://raw.githubusercontent.com/studio2201/shared-assets/master/styles/components/body.css" />
    <link data-trunk rel="css" href="https://raw.githubusercontent.com/studio2201/shared-assets/master/styles/themes/themes.css" />
    <link data-trunk rel="css" href="https://raw.githubusercontent.com/studio2201/shared-assets/master/styles/layout/header.css" />
    <link data-trunk rel="css" href="https://raw.githubusercontent.com/studio2201/shared-assets/master/styles/pages/print.css" />
    <link data-trunk rel="css" href="https://raw.githubusercontent.com/studio2201/shared-assets/master/styles/layout/footer.css" />
    
    <!-- Link to pre-compiled Tailwind stylesheet -->
    <link data-trunk rel="css" href="src/tailwind.css" />
    <link data-trunk rel="rust" data-bin="rustle-frontend" data-wasm-opt="0" />
    
    <!-- Copy public folder assets -->
    <link data-trunk rel="copy-dir" href="../assets" />
    
    <link rel="icon" href="assets/favicon.png?v=1.0.1" type="image/png" />
    <link rel="manifest" href="assets/manifest.json" />
  </head>
  <body class="layout-scroll">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/assets/service-worker.js')
            .then(reg => console.log('ServiceWorker registered', reg))
            .catch(err => console.error('ServiceWorker registration failed', err));
        });
      }
    </script>
  </body>
</html>
