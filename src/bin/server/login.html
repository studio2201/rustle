<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{SITE_TITLE}</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(17, 24, 39, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --error-color: #ef4444;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: 0;
        }
        body::before {
            top: 15%;
            left: 20%;
        }
        body::after {
            bottom: 15%;
            right: 20%;
        }
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            padding: 24px;
        }
        .card {
            background-color: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4), 0 10px 10px -5px rgba(0, 0, 0, 0.4);
        }
        .logo-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            border-radius: 12px;
            background: linear-gradient(135deg, #4f46e5 0%, #312e81 100%);
            margin-bottom: 24px;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }
        .logo-icon {
            font-size: 28px;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: -1px;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(to right, #ffffff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 24px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #ffffff;
            font-size: 16px;
            letter-spacing: 0.15em;
            text-align: center;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.25);
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }
        button:hover {
            background-color: var(--primary-hover);
        }
        button:active {
            transform: scale(0.98);
        }
        .error-msg {
            font-size: 13px;
            color: var(--error-color);
            margin-top: 12px;
            min-height: 20px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .error-msg.visible {
            opacity: 1;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
        .shake {
            animation: shake 0.2s ease-in-out 2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card" id="loginCard">
            <div class="logo-container">
                <span class="logo-icon">Ru</span>
            </div>
            <h1>{SITE_TITLE}</h1>
            <p>This application is protected by a PIN.</p>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="pinInput">Enter PIN</label>
                    <input type="password" id="pinInput" maxlength="10" placeholder="••••" required autofocus autocomplete="current-password">
                </div>
                <button type="submit">Unlock App</button>
                <div class="error-msg" id="errorMsg">Invalid PIN. Please try again.</div>
            </form>
        </div>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const pinInput = document.getElementById('pinInput');
            const errorMsg = document.getElementById('errorMsg');
            const card = document.getElementById('loginCard');
            const pin = pinInput.value.trim();

            if (!pin) return;

            try {
                const response = await fetch('/api/verify-pin', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ pin })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    window.location.reload();
                } else {
                    showError();
                }
            } catch (err) {
                showError();
            }
        }

        function showError() {
            const pinInput = document.getElementById('pinInput');
            const errorMsg = document.getElementById('errorMsg');
            const card = document.getElementById('loginCard');
            
            errorMsg.classList.add('visible');
            card.classList.add('shake');
            pinInput.value = '';
            pinInput.focus();

            setTimeout(() => {
                card.classList.remove('shake');
            }, 400);
        }
    </script>
</body>
</html>
